patch:
  translator/preedit_format: []
  switches:
    - name: ascii_mode
      states: [中, Ａ]
      reset: 1
    - name: ascii_punct # 中英标点
      states: [¥, $]
    - name: traditionalization
      states: [简, 繁]
    - name: emoji
      states: [💀, 😄]
      reset: 1
    - name: full_shape
      states: [半角, 全角]
    - name: search_single_char # search.lua 的功能开关，辅码查词时是否单字优先
      states: [正常, 单字]
      abbrev: [词, 单]
  "engine/filters/@before 8": lua_filter@*auto_en_spacer
  "engine/processors/@before 8": lua_processor@*auto_en_spacer_enter
