patch:
  ascii_composer:
    switch_key: { Shift_L: commit_code, Shift_R: commit_code }
  menu:
    page_size: 6
  schema_list:
    - { schema: rime_ice }
    - { schema: double_pinyin_flypy }
  "key_binder/bindings/+":
    - { when: composing, accept: Control+p, send: Up }
    - { when: composing, accept: Control+n, send: Down }
